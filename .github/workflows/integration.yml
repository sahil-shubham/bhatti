name: Integration Tests (Firecracker — RETIRED on the homelab cluster)

# RETIRED on the self-hosted cluster. This Firecracker suite ran on
# `arc-runner-set` and, via pkg/engine/firecracker setupGlobalFirewall, installs
# host-wide iptables rules for 10.0.0.0/8 (microVM egress isolation). On the
# shared k3s nodes those collide with flannel's pod/service networks
# (10.42/10.43 ⊂ 10/8): if a run is killed before its `if: always()` cleanup,
# the leftover `FORWARD -s 10/8 -d 10/8 -j DROP` silently kills cross-node pod
# DNS and takes down ARC itself. The krucible engine supersedes Firecracker and
# touches no host iptables — see krucible-integration.yml. Auto-triggers removed
# so it never lands on asus-i5 again; dispatch-only for ad-hoc runs on a
# DEDICATED (non-cluster) host — do NOT point `runs-on` back at arc-runner-set.
on:
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-rootfs:
    name: Build Rootfs
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    if: github.repository == 'sahil-shubham/bhatti'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build lohar
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o lohar ./cmd/lohar/

      - name: Build minimal rootfs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap e2fsprogs
          sudo ./scripts/build-tier.sh minimal arm64 ./lohar

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rootfs
          path: dist/rootfs-minimal-arm64.ext4
          retention-days: 1

  test:
    name: Integration Tests
    needs: build-rootfs
    runs-on: arc-runner-set
    # 45m: previous successful v1.11.12 run took 27m48s, the
    # subsequent workflow_dispatch run hit the 30m cap at 30m9s.
    # The suite is genuinely close to the old limit — 230+ tests,
    # ~10m of test time plus apt setup + rootfs download + kernel
    # boot overheads. 45m gives headroom for organic growth (labels
    # + DNS responder added ~15 tests; G1.8 QuiesceCopy will add
    # more) without hiding a real perf regression.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build lohar
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o lohar ./cmd/lohar/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rootfs

      - name: Setup
        run: |
          ls -la /dev/kvm
          test -w /dev/kvm || sudo chmod 666 /dev/kvm
          sudo mkdir -p /var/lib/bhatti/images
          sudo cp lohar /var/lib/bhatti/lohar
          sudo cp /opt/bhatti/bin/firecracker /usr/local/bin/firecracker
          sudo cp /opt/bhatti/bin/jailer /usr/local/bin/jailer
          sudo cp /opt/bhatti/images/vmlinux-arm64 /var/lib/bhatti/images/vmlinux-arm64
          sudo mv rootfs-minimal-arm64.ext4 /var/lib/bhatti/images/rootfs-minimal-arm64.ext4
          # Create jail user inside the runner pod
          sudo useradd -r -s /usr/sbin/nologin -u 10000 bhatti-vm 2>/dev/null || true

      - name: Run unit tests (recovery, IP pool)
        run: |
          go test ./cmd/bhatti/ -v -count=1 -timeout=120s -run 'TestRecover|TestFirecrackerState'

      - name: Run lohar cgroup integration tests
        run: |
          # The lohar package has a handful of integration tests that are
          # gated behind os.Getuid() != 0 and the presence of cgroup v2 at
          # /sys/fs/cgroup. They exercise the real kernel cgroup primitives
          # (cgroup.kill, memory.max enforcement, and the spawn-helper
          # placement guarantee for forking daemons). Skipped on dev
          # machines and non-root Linux; sudo here lets them execute.
          sudo go test ./cmd/lohar/ -v -count=1 -timeout=120s \
            -run 'TestCgroupKillIntegration|TestCgroupMemoryMaxEnforcement|TestStartDaemonPlacesProcessInUnitCgroup'

      - name: Run integration tests
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iproute2 iptables e2fsprogs
          # TestCheckpointVMConfig: skipped — exec after resume returns empty stdout (separate bug)
          sudo go test ./pkg/engine/firecracker/ -v -count=1 -timeout=0 \
            -skip 'TestCheckpointVMConfig'

      - name: Cleanup
        if: always()
        run: |
          sudo pkill -f firecracker 2>/dev/null || true
          sudo rm -rf /var/lib/bhatti 2>/dev/null || true
          IFACE=$(ip route show default | awk '/default/ {print $5}' | head -1)
          sudo iptables -D INPUT -s 10.0.0.0/8 -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
          sudo iptables -D INPUT -s 10.0.0.0/8 -m state --state NEW -j DROP 2>/dev/null || true
          sudo iptables -D FORWARD -s 10.0.0.0/8 -d 10.0.0.0/8 -j DROP 2>/dev/null || true
          sudo iptables -D FORWARD -s 10.0.0.0/8 ! -d 10.0.0.0/8 -j ACCEPT 2>/dev/null || true
          sudo iptables -D FORWARD -d 10.0.0.0/8 -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
          sudo iptables -t nat -D POSTROUTING -s 10.0.0.0/8 -o "$IFACE" -j MASQUERADE 2>/dev/null || true
          for dev in $(ip -o link show type tun 2>/dev/null | awk -F: '{print $2}' | grep '^tap'); do
            sudo ip link del "$dev" 2>/dev/null || true
          done
          for dev in $(ip -o link show type bridge 2>/dev/null | awk -F: '{print $2}' | grep '^brbhatti'); do
            sudo ip link del "$dev" 2>/dev/null || true
          done
