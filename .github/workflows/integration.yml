name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration Tests
    runs-on: arc-runner-set
    timeout-minutes: 20
    # Self-hosted: never run from forks
    if: github.repository == 'sahil-shubham/bhatti'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build lohar
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o lohar ./cmd/lohar/

      - name: Verify prerequisites
        run: |
          /opt/bhatti/bin/firecracker --version
          ls -lh /opt/bhatti/images/vmlinux-arm64
          ls -la /dev/kvm
          test -w /dev/kvm || sudo chmod 666 /dev/kvm

      - name: Build rootfs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iproute2 iptables e2fsprogs debootstrap
          sudo mkdir -p /var/lib/bhatti/images
          sudo cp lohar /var/lib/bhatti/lohar
          sudo cp /opt/bhatti/bin/firecracker /usr/local/bin/firecracker
          sudo cp /opt/bhatti/images/vmlinux-arm64 /var/lib/bhatti/images/vmlinux-arm64
          sudo ./scripts/build-tier.sh minimal arm64 ./lohar
          sudo mv dist/rootfs-minimal-arm64.ext4 /var/lib/bhatti/images/rootfs-base-arm64.ext4

      - name: Run integration tests
        run: |
          sudo go test ./pkg/engine/firecracker/ -v -count=1 -timeout=300s \
            -skip 'TestCheckpointVMConfig'

      - name: Cleanup
        if: always()
        run: |
          sudo pkill -f firecracker 2>/dev/null || true
          sudo rm -rf /var/lib/bhatti 2>/dev/null || true
