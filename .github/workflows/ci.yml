name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (with -race)
        # -race on the full unit-test surface catches the class of
        # concurrency bug that Tranche 0a of PLAN-bhatti-v2.md is
        # chasing — sync.Map LoadOrStore+Store races on the thermal
        # manager, route-cache LRU under churn, rate-limiter eviction.
        # cmd/lohar is excluded here because some of its tests need a
        # real sandbox (PID 1 dirs, vsock); the shim subset runs with
        # -race in the next step. Timeout bumped to 240s — -race adds
        # ~2× overhead on the SQLite-backed store tests.
        run: go test -race $(go list ./... | grep -v cmd/lohar) -count=1 -timeout=240s

      # The systemctl/journalctl/syslog/cgroup shim tests in cmd/lohar are
      # tempdir-sandboxed unit tests that don't need a real Firecracker
      # VM. Run them here with -race to catch concurrency bugs in the
      # Registry mutex, the IPC dispatch's captureOutputMu, and the
      # watcher's restartBurst map. The agent/session tests need a real
      # sandbox (PID 1 dirs, vsock, etc.) so they're skipped here and
      # left to the integration workflow.
      - name: Test lohar shim (with -race)
        run: |
          go test -race -count=1 -timeout=120s ./cmd/lohar/ \
            -skip '^(TestAgent|TestHelperAgent|TestSession|TestPipedSession)'

  krucible-build:
    # The krucible engine's safety net: build the Rust fork (libkrun) + the cgo
    # helper (bhatti-vmm) + the krucible-tagged Go, then run the pure-unit tests.
    # This is a build/link + unit gate only — the VM suites need a hypervisor and
    # self-skip here (no /dev/kvm on GitHub-hosted runners); they run on the
    # self-hosted KVM cluster in krucible-integration.yml. No libkrunfw is needed: libkrun
    # dlopen's it lazily and the external/lean-kernel path skips it entirely.
    name: Krucible Build & Unit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Init libkrucible submodule (public, over https)
        # libkrucible is public, so fetch it over https with the default token
        # rather than the .gitmodules ssh url (which would need a deploy key on
        # a GitHub-hosted runner). Override the url for this run only; .gitmodules
        # is left as-is for local (ssh) dev.
        run: |
          git config submodule.libkrucible.url https://github.com/sahil-shubham/libkrucible.git
          git submodule update --init --recursive libkrucible

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build deps + toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config
          rustc --version && cargo --version   # Rust is preinstalled on ubuntu-latest

      - name: Build libkrucible (libkrun --no-default-features --features blk)
        # Catches Rust / cfg breakage in the fork on x86-linux.
        run: make krucible

      - name: Build bhatti-vmm (cgo link against libkrun)
        # Catches cgo/link breakage in the helper (the class that's been invisible
        # to CI). No codesigning on Linux (the Makefile gates that on Darwin).
        run: make vmm

      - name: Build & vet (krucible tag)
        run: |
          export PKG_CONFIG_PATH="$PWD/libkrucible/_install/lib/pkgconfig:$PKG_CONFIG_PATH"
          CGO_ENABLED=1 go build -tags krucible ./...
          CGO_ENABLED=1 go vet -tags krucible ./pkg/engine/krucible/ ./cmd/vmm/

      - name: Unit tests (krucible tag; VM suites self-skip without /dev/kvm)
        # hasHypervisor() makes the VM suites skip on this KVM-less runner; the
        # pure-unit tests (bundle/capability/recovery/state) run for real.
        run: |
          export PKG_CONFIG_PATH="$PWD/libkrucible/_install/lib/pkgconfig:$PKG_CONFIG_PATH"
          CGO_ENABLED=1 go test -tags krucible ./pkg/engine/krucible/ -count=1

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Shellcheck install.sh (strict)
        # No --severity filter on the user-facing installer. The previous
        # --severity=error policy hid SC2024 (sudo redirect smell), SC2015
        # (A&&B||C anti-pattern), SC2059 (variables in printf format) —
        # all of which were fixed in this hardening pass. -e SC1091 stays
        # because it flags `source` paths shellcheck can't resolve, which
        # is expected for our bats-test sourcing pattern.
        run: shellcheck -e SC1091 scripts/install.sh

      - name: Shellcheck other scripts (error-level)
        # build-kernel/build-rootfs/test-on-pi/uninstall have outstanding
        # info/warning-level findings that aren't in scope of the install
        # script audit. Keep them at --severity=error so a future regression
        # in the error tier is still caught.
        run: |
          find scripts/ -name '*.sh' ! -name 'install.sh' \
            -exec shellcheck --severity=error -e SC1091 {} +

  install-script-tests:
    # Two-tier coverage of scripts/install.sh:
    #
    #   install_test.bats  — unit tests for the pure helpers (53 tests).
    #                        Sub-second, no network, no disk side effects.
    #                        Covers: arch mapping, install-type detection,
    #                        version comparisons, tier classification, the
    #                        gate logic from the c80638f / 4286d3a bug fix,
    #                        flag parsing, sudo invariants, checksum logic.
    #
    #   install_smoke.bats — end-to-end against a local fake-release tree
    #                        (5 tests). Runs install.sh as a process and
    #                        verifies: fresh CLI install, idempotent
    #                        no-op, version update, checksum mismatch
    #                        dies loudly with no half-installed artifact,
    #                        missing-asset dies at download.
    #
    # Together: "if these pass, install + update works modulo GitHub
    # being down". macOS is in the matrix because install.sh has
    # macOS-specific paths (Apple Silicon /usr/local/bin creation, xattr
    # quarantine strip, /bin/bash 3.2 compatibility) that don't exercise
    # on a Linux host — same class as the c31d997 sudo regression.
    name: Install Script Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq bats
          fi
          bats --version

      - name: Unit tests (install_test.bats)
        run: bats scripts/install_test.bats

      - name: Smoke tests (install_smoke.bats)
        # Sets BHATTI_TEST_* env vars to redirect the script at a local
        # fake-release tree; doesn't touch GitHub or /usr/local/bin.
        run: bats scripts/install_smoke.bats
