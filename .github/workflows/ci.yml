name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test $(go list ./... | grep -v cmd/lohar) -count=1 -timeout=120s

      # The systemctl/journalctl/syslog/cgroup shim tests in cmd/lohar are
      # tempdir-sandboxed unit tests that don't need a real Firecracker
      # VM. Run them here with -race to catch concurrency bugs in the
      # Registry mutex, the IPC dispatch's captureOutputMu, and the
      # watcher's restartBurst map. The agent/session tests need a real
      # sandbox (PID 1 dirs, vsock, etc.) so they're skipped here and
      # left to the integration workflow.
      - name: Test lohar shim (with -race)
        run: |
          go test -race -count=1 -timeout=120s ./cmd/lohar/ \
            -skip '^(TestAgent|TestHelperAgent|TestSession|TestPipedSession)'

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run shellcheck
        run: find scripts/ -name '*.sh' -exec shellcheck --severity=error -e SC1091 {} +

  install-script-tests:
    # Bats tests for scripts/install.sh. Until this job existed the
    # tests in scripts/install_test.bats were never run by CI — they
    # could break and nobody would know. macOS is in the matrix because
    # install.sh has macOS-specific code paths (CLI-only flow,
    # /usr/local/bin creation on Apple Silicon, xattr quarantine strip,
    # /bin/bash 3.2) that don't run on a Linux host.
    name: Install Script Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install bats-core
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq bats
          fi
          bats --version

      - name: Run bats
        run: bats scripts/install_test.bats
