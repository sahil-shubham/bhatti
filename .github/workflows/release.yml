name: Release

# krucible (v2) release pipeline. Replaces the Firecracker-era pipeline (which
# lives on the `firecracker` branch): instead of a static Linux-only binary set,
# it ships a relocatable, signed native runtime closure per host platform —
# {bhatti CLI, bhatti-vmm (cgo), libkrun (our fork), lean guest kernel} — across
# linux/amd64, linux/arm64, darwin/arm64, plus separately-versioned guest rootfs
# tiers. See docs/internal/PLAN-krucible-release.md.
#
# Triggers: a `v*` tag runs the whole thing and publishes a GitHub release; a
# manual dispatch is a DRY-RUN (builds + packages + uploads artifacts, never
# publishes) so we validate artifacts on real runners before cutting v2.0.0.
#
# Proven building blocks: macOS sign+notarize is validated in
# macos-vmm-signing.yml (notarization Accepted); the rpath/​install_name_tool
# rewrite is the 0b recipe. What a dispatch dry-run still needs to shake out is
# the cross-job packaging + the Linux relocatability on a clean box.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli:
    name: CLI + lohar (cross-compile)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Build bhatti CLI (all platforms, pure Go)
        run: make release

      - name: Build lohar (guest agent, linux amd64 + arm64)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lohar-linux-amd64 ./cmd/lohar/
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lohar-linux-arm64 ./cmd/lohar/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli
          path: dist/*

  lean-kernel:
    name: Lean kernel (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          # Native docker per arch — build-lean-kernel.sh runs in a container and
          # its cross-arch path is emulated (slow), so match runner arch to target.
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build lean kernel (Docker)
        # Kernel version is pinned in build-lean-kernel.sh; source is git.kernel.org
        # (the Fastly CDN /pub tree is unreachable from CI egress).
        run: scripts/build-lean-kernel.sh ${{ matrix.arch }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lean-kernel-${{ matrix.arch }}
          path: dist/kernel/*

  runtime:
    name: libkrun + bhatti-vmm (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 sets the glibc floor (2.35) for the Linux runtime closure (0d).
          - target: linux-amd64
            runner: ubuntu-22.04
            os: linux
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - target: darwin-arm64
            runner: macos-14
            os: darwin
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Fetch libkrucible submodule (https)
        run: |
          git config submodule.libkrucible.url https://github.com/sahil-shubham/libkrucible.git
          git submodule update --init --recursive libkrucible

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Linux build deps (patchelf for rpath, pkg-config for cgo)
        if: matrix.os == 'linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential pkg-config patchelf

      - name: Ensure Rust toolchain
        run: rustc --version >/dev/null 2>&1 || rustup default stable

      - name: Build libkrun (krucible fork) + bhatti-vmm + bhatti-netd
        run: |
          make krucible
          make vmm
          make netd

      - name: Make the closure relocatable (0b)
        # Rewrite the runtime lib references to a relative rpath so the shipped
        # prefix resolves libkrun via bin/../lib with no LD_LIBRARY_PATH/DYLD_*.
        # MUST run before codesign on macOS (install_name_tool invalidates the
        # signature). Stage the closure into stage/{bin,lib}.
        run: |
          set -euo pipefail
          mkdir -p stage/bin stage/lib
          cp bhatti-vmm stage/bin/bhatti-vmm
          # bhatti-netd (opt-in net-backend gateway): Linux/KVM-focused; ship it
          # only on Linux for now (macOS/HVF net is unvalidated and an unsigned
          # helper would fail notarization). Pure Go, no libkrun linkage.
          if [ "${{ matrix.os }}" = "linux" ]; then cp bhatti-netd stage/bin/bhatti-netd; fi
          if [ "${{ matrix.os }}" = "darwin" ]; then
            cp -R libkrucible/_install/lib/libkrun*.dylib stage/lib/
            DYLIB=$(find stage/lib -maxdepth 1 -type f -name 'libkrun.*.dylib' | head -1)
            # Derive the soname (e.g. libkrun.2.dylib) from the dylib's own install-name so
            # the rpath rewrite tracks the ABI major (libkrun 2.0 = libkrun.2.dylib), not a pin.
            SONAME=$(basename "$(otool -D "$DYLIB" | tail -1)")
            install_name_tool -id "@rpath/$SONAME" "$DYLIB"
            install_name_tool -change "$SONAME" "@rpath/$SONAME" stage/bin/bhatti-vmm
            install_name_tool -add_rpath @loader_path/../lib stage/bin/bhatti-vmm
            echo "=== otool -L (expect @rpath/$SONAME) ===" && otool -L stage/bin/bhatti-vmm | grep -i krun
          else
            cp -P libkrucible/_install/lib64/libkrun.so* stage/lib/ 2>/dev/null || cp -P libkrucible/_install/lib/libkrun.so* stage/lib/
            patchelf --set-rpath '$ORIGIN/../lib' stage/bin/bhatti-vmm
            echo "=== rpath (expect \$ORIGIN/../lib) ===" && patchelf --print-rpath stage/bin/bhatti-vmm
          fi

      # --- macOS Developer ID signing + notarization (proven in macos-vmm-signing.yml) ---
      - name: Import Developer ID cert into a temp keychain
        if: matrix.os == 'darwin'
        env:
          P12_BASE64: ${{ secrets.APPLE_DEVID_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/bhatti-signing.keychain-db"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          curl -fsSL -o "$RUNNER_TEMP/DeveloperIDG2CA.cer" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN" || true
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Developer-ID sign (hardened runtime + hypervisor entitlement)
        if: matrix.os == 'darwin'
        env:
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/bhatti-signing.keychain-db"
          DYLIB=$(find stage/lib -maxdepth 1 -type f -name 'libkrun.*.dylib' | head -1)
          codesign --force --timestamp --options runtime --keychain "$KEYCHAIN" \
            --sign "$IDENTITY" "$DYLIB"
          codesign --force --timestamp --options runtime --keychain "$KEYCHAIN" \
            --entitlements cmd/vmm/hvf-entitlements.plist \
            --sign "$IDENTITY" stage/bin/bhatti-vmm
          codesign -dv --verbose=4 stage/bin/bhatti-vmm 2>&1 | grep -iE 'Authority|TeamIdentifier|flags|Timestamp='
          codesign --verify --strict stage/bin/bhatti-vmm

      - name: Notarize (notarytool)
        if: matrix.os == 'darwin'
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          ditto -c -k --sequesterRsrc --keepParent stage "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" --wait --timeout 15m
          rm -f "$RUNNER_TEMP/notary.p8"

      - name: Clean up keychain
        if: always() && matrix.os == 'darwin'
        run: security delete-keychain "$RUNNER_TEMP/bhatti-signing.keychain-db" || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: runtime-${{ matrix.target }}
          path: stage/**

  rootfs:
    name: Rootfs (${{ matrix.tier }}-${{ matrix.arch }})
    needs: cli
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        tier: [minimal, browser, docker, computer]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cli

      - name: Build rootfs
        run: |
          mv lohar-linux-${{ matrix.arch }} lohar
          chmod +x lohar
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap
          sudo ./scripts/build-tier.sh ${{ matrix.tier }} ${{ matrix.arch }} ./lohar

      - name: Compress
        run: |
          sudo apt-get install -y -qq zstd
          sudo zstd -19 dist/rootfs-${{ matrix.tier }}-${{ matrix.arch }}.ext4

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rootfs-${{ matrix.tier }}-${{ matrix.arch }}
          path: dist/rootfs-*.ext4.zst

  package:
    name: Package + release
    needs: [cli, lean-kernel, runtime, rootfs]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Assemble per-platform tarballs + checksums
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq zstd
          VER="${GITHUB_REF_NAME}"
          case "$VER" in v*) : ;; *) VER="dev-$(date +%Y%m%d)-${GITHUB_SHA::7}" ;; esac
          mkdir -p release
          # target -> (cli os/arch, guest-kernel arch)
          pack() {  # $1=target  $2=cli-os  $3=cli-arch  $4=kernel-arch
            local target="$1" os="$2" arch="$3" karch="$4"
            local dir="bhatti-${VER}-${target}"
            mkdir -p "$dir/bin" "$dir/lib" "$dir/kernel"
            cp "artifacts/cli/bhatti-${os}-${arch}" "$dir/bin/bhatti"
            cp -R artifacts/runtime-${target}/bin/* "$dir/bin/"
            cp -R artifacts/runtime-${target}/lib/* "$dir/lib/"
            cp artifacts/lean-kernel-${karch}/* "$dir/kernel/"
            chmod +x "$dir/bin/"*
            tar --zstd -cf "release/${dir}.tar.zst" "$dir"
            rm -rf "$dir"
          }
          pack linux-amd64  linux  amd64 x86_64
          pack linux-arm64  linux  arm64 aarch64
          pack darwin-arm64 darwin arm64 aarch64
          # Guest rootfs tiers ship separately (guest-arch, large, cache well).
          find artifacts -name 'rootfs-*.ext4.zst' -exec cp {} release/ \;
          cd release
          sha256sum * > checksums-sha256.txt
          echo "=== release artifacts ===" && ls -lh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-bundle
          path: release/*

      # Publish only on a real tag; a workflow_dispatch dry-run stops at the
      # uploaded artifact above (validate before cutting v2.0.0).
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          draft: ${{ contains(github.ref_name, '-rc') }}
