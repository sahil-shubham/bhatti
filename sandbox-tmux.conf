# forge sandbox tmux.conf — plugins sourced directly, no TPM runtime delay

# Set the control character to Ctrl+Spacebar (instead of Ctrl+B)
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix
set -g mouse on

# Setting vi in scroll mode, and vi visual mode keybinding using xclip
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Ensure enough space for the indicator
set -g status-right-length 50

# Make the windows use the same color scheme
set -g window-status-current-style "bg=colour2,fg=colour0"
set -g window-status-style "bg=colour2,fg=colour0"

# vim-like pane resizing
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# and now unbind keys
unbind Up
unbind Down
unbind Left
unbind Right

unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

bind r source-file ~/.tmux.conf \; display "tmux config reloaded!"

# Window management - reorder windows
bind -r "<" swap-window -t -1 -d
bind -r ">" swap-window -t +1 -d
bind "." command-prompt "move-window -t '%%'"

# Session management - switch between sessions
bind "[" copy-mode
bind "(" switch-client -p
bind ")" switch-client -n

# Move window to another session
bind m command-prompt -p "Move window to session:" "move-window -t '%%'"
bind M command-prompt -p "Move window to new session:" "new-session -d -s '%1' \; move-window -t '%1:' \; kill-window -t '%1:0'"

# Pane management - move panes between windows
bind P switch-client -T pane
bind -T pane b break-pane
bind -T pane j command-prompt -p "Send pane to window:" "move-pane -t '%%'"

# --- Source plugins directly (pre-cloned in image) ---
run-shell ~/.tmux/plugins/tmux-sensible/sensible.tmux
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
run-shell ~/.tmux/plugins/tmux-cpu/cpu.tmux

# Dracula theme
set -g @dracula-plugins "cpu-usage ram-usage sys-temp"
set -g @dracula-show-powerline false
set -g @dracula-cpu-usage-label "CPU"
set -g @dracula-ram-usage-label "RAM"
set -g @dracula-sys-temp-label "TEMP"
set -g @dracula-border-contrast true
run-shell ~/.tmux/plugins/tmux/dracula.tmux

# tmux-resurrect configuration
set -g @resurrect-silent-restore 'on'
